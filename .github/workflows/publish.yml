name: Publish to npm

# Publish flow:
#   1. Push a git tag `v<x.y.z>` matching package.json's "version" field.
#   2. CI checks out, installs, typechecks, runs unit tests, builds.
#   3. `npm publish --provenance --tag beta` publishes the version AND
#      atomically sets the `beta` dist-tag in a single OIDC-authenticated
#      step. No separate `npm dist-tag add` call.
#
# Promoting a beta to stable (one-time, when you're ready):
#   npm dist-tag add opencode-windsurf-auth@<version> latest
#
# Manual override: `workflow_dispatch` (with optional `dry_run`) lets you
# rehearse the pipeline without publishing.
#
# Auth:
#   - `npm publish --tag beta` uses npm Trusted Publisher (OIDC). No
#     long-lived secret — `id-token: write` is the only permission needed.
#     Configure the publisher once at:
#       https://www.npmjs.com/package/opencode-windsurf-auth/access
#     Publisher = GitHub Actions, org = rsvedant,
#     repo = opencode-windsurf-auth, workflow filename = publish.yml.
#   - We removed the separate `npm dist-tag add` step (and its `NPM_TOKEN`
#     dependency) because npm's OIDC scope only covers `publish`, and the
#     dist-tag command requires a 2FA OTP which CI can't supply. Folding
#     beta into the publish step itself works around that entirely.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip the publish step (rehearsal only)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # required for `npm publish --provenance` (sigstore)

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, publish & tag beta
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14

      - name: Setup Node (npm + provenance)
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm >= 11.5.1 for OIDC Trusted Publisher auth
        run: npm install -g npm@latest && npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve and verify version
        id: version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "${PKG_VERSION}" != "${TAG_VERSION}" ]]; then
              echo "::error::Git tag v${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
              exit 1
            fi
          fi
          echo "version=${PKG_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Resolved version: ${PKG_VERSION}"

      - name: Refuse to publish a version that already exists
        if: ${{ inputs.dry_run != true }}
        run: |
          if npm view "opencode-windsurf-auth@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "::error::opencode-windsurf-auth@${{ steps.version.outputs.version }} is already published. Bump package.json and re-tag."
            exit 1
          fi

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun test tests/unit

      - name: Build
        run: bun run build

      - name: Publish to npm (beta)
        if: ${{ inputs.dry_run != true }}
        # --tag beta makes this publish atomically set the `beta` dist-tag
        # via the OIDC-authenticated publish call. The previous workflow
        # had a separate `npm dist-tag add` step that needed a 2FA OTP
        # (npm Trusted Publisher's OIDC scope covers `publish` only), so
        # CI kept failing that step and `beta` would drift behind `latest`.
        # Promote to `latest` manually when you're ready for stable:
        #   npm dist-tag add opencode-windsurf-auth@<version> latest
        run: npm publish --provenance --access public --tag beta

      - name: Summary
        run: |
          {
            echo "## opencode-windsurf-auth publish"
            echo ""
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              echo "**Dry run** — would have published \`${{ steps.version.outputs.version }}\` with the \`beta\` dist-tag."
            else
              echo "Published \`opencode-windsurf-auth@${{ steps.version.outputs.version }}\` with the \`beta\` dist-tag."
              echo ""
              echo "Install with: \`bun add opencode-windsurf-auth@beta\`"
              echo ""
              echo "Promote to \`latest\` (when ready): \`npm dist-tag add opencode-windsurf-auth@${{ steps.version.outputs.version }} latest\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
